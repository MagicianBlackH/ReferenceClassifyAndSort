<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参考文献排序工具</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .container { border: 1px solid #ccc; border-radius: 5px; padding: 20px; }
        textarea { width: 100%; height: 400px; font-family: monospace; margin-top: 10px; }
        button { margin: 10px 0; padding: 10px 20px; font-size: 16px; }
        .note { background-color: #f9f9f9; padding: 10px; border-left: 4px solid #007bff; margin: 20px 0; }
    </style>
    <!-- 引入 JSZip 用于解析 DOCX 文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <h1>📚 Yes, HPC will save the world!</h1>
    <h2>参考文献分类排序工具</h2>
    <div class="container">
        <p style="color: green; font-weight: 900;">上传 TXT 或 DOCX 文件（每行一条文献），程序将自动去重、区分中英文、按作者音序排序并重新编号。</p>
        <input type="file" id="fileInput" accept=".txt,.docx,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        <br>
        <button id="processBtn">排序并显示</button>
        <div class="note">
            <strong>格式要求：</strong> 每行一条文献，编号可有可无（如 [8]、[] 或无编号），甚至文献有重复都行。示例：<br>
            <code>
                [8] Huitt W, Hummel J. Piaget’s theory...<br>
                Huitt W, Hummel J. Piaget’s theory...<br>
                [] 陆霞,董永权.面向计算思维培养的儿童编程教育研究综述...<br>
            </code>
        </div>
        <textarea id="output" placeholder="排序后的文献将显示在这里..."></textarea>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', handleFile);

        async function handleFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('请先选择一个文件');
                return;
            }

            const output = document.getElementById('output');
            output.value = '正在处理，请稍候...';

            try {
                const lines = await readFileLines(file);
                const processed = processReferences(lines);
                output.value = formatOutput(processed);
            } catch (error) {
                output.value = '处理出错：' + error.message;
                console.error(error);
            }
        }

        /**
         * 根据文件类型读取所有行（返回字符串数组）
         */
        async function readFileLines(file) {
            const fileName = file.name.toLowerCase();
            if (fileName.endsWith('.txt')) {
                return readTxtLines(file);
            } else if (fileName.endsWith('.docx')) {
                return readDocxLines(file);
            } else {
                throw new Error('不支持的文件类型，请上传 .txt 或 .docx');
            }
        }

        function readTxtLines(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    // 按行分割，去除空行
                    const lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line !== '');
                    resolve(lines);
                };
                reader.onerror = () => reject(new Error('读取 TXT 文件失败'));
                reader.readAsText(file, 'utf-8');
            });
        }

        async function readDocxLines(file) {
            try {
                const zip = new JSZip();
                const zipData = await zip.loadAsync(file);
                const docXmlFile = zipData.file('word/document.xml');
                if (!docXmlFile) throw new Error('DOCX 文件中未找到 document.xml');

                const xmlText = await docXmlFile.async('text');
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'application/xml');

                // 获取所有段落 <w:p>
                const paragraphs = xmlDoc.getElementsByTagName('w:p');
                const lines = [];
                for (let i = 0; i < paragraphs.length; i++) {
                    const p = paragraphs[i];
                    // 获取段落内所有文本 <w:t>
                    const texts = p.getElementsByTagName('w:t');
                    let paraText = '';
                    for (let j = 0; j < texts.length; j++) {
                        paraText += texts[j].textContent;
                    }
                    paraText = paraText.trim();
                    if (paraText) lines.push(paraText);
                }
                return lines;
            } catch (err) {
                throw new Error('解析 DOCX 文件失败：' + err.message);
            }
        }

        /**
         * 核心处理逻辑：去重、分类、排序
         */
        function processReferences(lines) {
            // 步骤1：标准化（去除每行开头的编号/符号，直到第一个中英文字符）
            const normalizedMap = new Map(); // key: 标准化内容, value: 标准化内容（用于去重）
            for (let rawLine of lines) {
                const normalized = normalizeLine(rawLine);
                if (normalized && !normalizedMap.has(normalized)) {
                    normalizedMap.set(normalized, normalized);
                }
            }

            // 步骤2：提取第一作者并分类
            const chineseItems = [];
            const englishItems = [];

            for (let ref of normalizedMap.values()) {
                const firstAuthor = extractFirstAuthor(ref);
                const isChinese = hasChinese(firstAuthor);
                const item = { ref, author: firstAuthor };

                if (isChinese) {
                    chineseItems.push(item);
                } else {
                    englishItems.push(item);
                }
            }

            // 步骤3：排序
            // 中文按拼音排序
            const collator = new Intl.Collator('zh-CN', { sensitivity: 'accent' });
            chineseItems.sort((a, b) => collator.compare(a.author, b.author));

            // 英文按姓氏（第一个空格前的内容）排序
            englishItems.sort((a, b) => {
                const surnameA = extractSurname(a.author);
                const surnameB = extractSurname(b.author);
                return surnameA.localeCompare(surnameB);
            });

            return { chinese: chineseItems, english: englishItems };
        }

        /** 去除开头直到第一个中英文或中文字符之前的所有内容 */
        function normalizeLine(text) {
            const match = text.match(/[a-zA-Z\u4e00-\u9fff]/);
            if (match) {
                return text.substring(match.index).trim();
            }
            return text.trim(); // 保底返回
        }

        /** 判断字符串是否包含中文 */
        function hasChinese(text) {
            return /[\u4e00-\u9fff]/.test(text);
        }

        /** 提取第一作者：取第一个 '.' 前的内容，再取第一个逗号前 */
        function extractFirstAuthor(ref) {
            // 找到第一个点（可能带空格）
            let dotIndex = ref.indexOf('. ');
            if (dotIndex === -1) dotIndex = ref.indexOf('.');
            if (dotIndex === -1) return ''; // 没有点，无法提取作者

            const beforeDot = ref.substring(0, dotIndex).trim();
            // 取第一个逗号前的内容
            const commaIndex = beforeDot.indexOf(',');
            if (commaIndex !== -1) {
                return beforeDot.substring(0, commaIndex).trim();
            }
            return beforeDot; // 如果没有逗号，则整个字符串作为作者
        }

        /** 英文：提取姓氏（第一个空格前的内容） */
        function extractSurname(author) {
            const spaceIndex = author.indexOf(' ');
            if (spaceIndex !== -1) {
                return author.substring(0, spaceIndex).toLowerCase();
            }
            return author.toLowerCase(); // 无空格则整个作为姓氏
        }

        /** 格式化输出：按中英文部分分别加编号 */
        function formatOutput({ chinese, english }) {
            let result = '中文文献\n';
            chinese.forEach((item, idx) => {
                result += `[${idx + 1}] ${item.ref}\n`;
            });
            result += '\n英文文献\n';
            english.forEach((item, idx) => {
                result += `[${idx + 1}] ${item.ref}\n`;
            });
            return result;
        }
    </script>
</body>
</html>
